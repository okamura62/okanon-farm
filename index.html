<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>おかのんファーム</title><link rel="stylesheet" href="style.css"></head><body><main id="game">
<section id="title" class="screen active"><img class="bg" src="assets/background.png"><img class="title-sign" src="assets/title_sign.png"><div class="title-menu"><button data-screen="farm"><img src="assets/enter.png"></button><button data-screen="voice"><img src="assets/voice.png"></button><button data-screen="tip"><img src="assets/tip.png"></button></div></section>
<section id="farm" class="screen"><img class="bg" src="assets/background.png"><button class="back" data-screen="title"><img src="assets/back_title.png"></button><div id="selectionText" class="selection">種を選択してください</div><div id="field" class="field"></div><div class="farm-menu"><button id="openSeeds"><img src="assets/seed_button.png"></button><button id="harvest"><img src="assets/harvest_button.png"></button><button id="ship"><img src="assets/ship_button.png"></button></div></section>
<section id="voice" class="screen"><img class="bg" src="assets/background.png"><button class="back" data-screen="title"><img src="assets/back_voice.png"></button><div class="voice-panel"><p>この画面上に複数ボタンを用意</p><p>押したボタンに対応して割り付けられた声がなる</p><div id="voiceButtons"></div></div></section>
<section id="tip" class="screen"><img class="bg" src="assets/background.png"><button class="back" data-screen="title"><img src="assets/back_voice.png"></button><div class="tip-box"><h2>おひねり</h2><div class="amount"><span>￥</span><input id="amountInput" type="number" inputmode="numeric"></div><button id="confirmTip">確定</button></div></section>
<div id="seedPopup" class="overlay hidden"><div class="dim"></div><div class="seed-wrap"><img src="assets/seed_list_exact.png"><div id="seedHotspots"></div><button id="closeSeeds">戻る</button></div></div>
<div id="paymentPopup" class="overlay hidden"><div class="dim"></div><div class="payment-sheet"><div class="grabber"></div><h3>おひねり確認</h3><p>岡野さんへ</p><strong id="paymentAmount">￥0</strong><button id="completePayment">確定</button><button id="cancelPayment">戻る</button></div></div>
<div id="toast"></div></main><script src="script.js"></script></body></html>
